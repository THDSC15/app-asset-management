<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}IT Asset Management{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="{{ url_for('index') }}">IT Asset Management</a>

        <div>
            {% if current_user.is_authenticated %}
                <a class="btn btn-outline-light btn-sm" href="{{ url_for('create_asset') }}">Create Asset</a>
                <a class="btn btn-outline-light btn-sm" href="{{ url_for('logout') }}">Logout</a>
            {% else %}
                <a class="btn btn-outline-light btn-sm" href="{{ url_for('login') }}">Login</a>
                <a class="btn btn-outline-light btn-sm" href="{{ url_for('register') }}">Register</a>
            {% endif %}
        </div>
    </div>
</nav>

<main class="container">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'danger' else category }} alert-dismissible fade show">
                {{ message }}
            </div>
        {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}

</main>

</body>
</html>
